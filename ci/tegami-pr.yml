# Builds the release-preview comment for a PR.
#
# Runs on `pull_request` (NOT `pull_request_target`), so it executes untrusted
# PR code and stays read-only. The companion tegami-pr-comment.yml posts the
# result with write permissions without ever running PR code.
name: Tegami PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  preview:
    name: Release preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2
      - run: bun i

      - name: Build release preview
        run: bun run tegami pr preview --artifact tegami-pr-preview.md

      - uses: actions/upload-artifact@v4
        with:
          name: tegami-pr-preview
          path: tegami-pr-preview.md
